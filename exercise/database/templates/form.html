<html>
  <head>
    <title>Form</title>
  </head>
  <body>
    <form action="/movie-form" method="post">
      <label>
        Name:
        <input type="text" name="movie_name" required />
      </label>
      <label>
        Description:
        <input type="text" name="movie_description" required />
      </label>
      <label>
        Rating:
        <input type="number" name="movie_rating" />
      </label>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
