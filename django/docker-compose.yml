version: '3.8'

services:
  db:
    image: postgres:16
    container_name: django_postgres_learning
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: exercises  # <-- This tells Docker to auto-create the database!
    ports:
      - "5432:5432"
    volumes:
      - postgres_learning_data:/var/lib/postgresql/data

volumes:
  postgres_learning_data: